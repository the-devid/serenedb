name: task | serenedb build & test

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux"
      KIND:
        description: "What to test"
        type: choice
        required: true
        options:
          - both
          - unit
          - functional
          - functional_fast
          - none
      DEV:
        description: "Enable assertions (SDB_DEV)"
        type: boolean
        required: false
        default: true
      INSTRUMENTATION:
        description: "Sanitizer or coverage"
        type: choice
        required: false
        default: "none"
        options:
          - none
          - coverage
          - asan
          - msan
          - tsan
          - ubsan
      EXTRA_CMAKE_FLAGS:
        description: "Additional cmake flags (rare overrides)"
        type: string
        required: false
        default: ""
      PR_SHA:
        description: "Commit SHA to checkout (empty = workflow ref)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux"
      KIND:
        description: "What to test"
        type: string
        required: true
        # none: build only (compile check)
        # unit: gtest suites (vpack, iresearch, serenedb-tests)
        # functional: sqllogic + recovery (all tests including slow)
        # functional_fast: sqllogic + recovery (skip .test_slow)
        # both: unit + functional (for coverage)
      DEV:
        description: "Enable assertions (SDB_DEV)"
        type: boolean
        required: false
        default: true
      INSTRUMENTATION:
        description: "Sanitizer or coverage"
        type: string
        required: false
        default: "none"
        # none, asan, msan, tsan, ubsan, coverage
      EXTRA_CMAKE_FLAGS:
        description: "Additional cmake flags (rare overrides)"
        type: string
        required: false
        default: ""
      PR_SHA:
        description: "Commit SHA to checkout (fork PR support; empty = workflow ref)"
        type: string
        required: false
        default: ""
env:
  WORKSPACE: ${{ github.workspace }}
  BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest
  CARGO_TARGET_CACHE: /mnt/data/.cargo-target-sqllogic

jobs:
  test:
    name: "test (${{ inputs.KIND }}, ${{ inputs.INSTRUMENTATION }})"
    runs-on:
      - ${{ inputs.LOCATION }}
    permissions:
      contents: read

    steps:
      - name: Derive build flags
        run: |
          # KIND -> build targets and test scripts
          case "${{ inputs.KIND }}" in
            none)
              echo "SDB_GTEST=Off" >> $GITHUB_ENV
              echo "SDB_FAULT_INJECTION=Off" >> $GITHUB_ENV
              echo "SKIP_SLOW_TESTS=false" >> $GITHUB_ENV
              echo "RUN_UNIT_TESTS=false" >> $GITHUB_ENV
              echo "RUN_INTEGRATION_TESTS=false" >> $GITHUB_ENV
              ;;
            unit)
              echo "SDB_GTEST=On" >> $GITHUB_ENV
              echo "SDB_FAULT_INJECTION=Off" >> $GITHUB_ENV
              echo "SKIP_SLOW_TESTS=false" >> $GITHUB_ENV
              echo "RUN_UNIT_TESTS=true" >> $GITHUB_ENV
              echo "RUN_INTEGRATION_TESTS=false" >> $GITHUB_ENV
              ;;
            functional)
              echo "SDB_GTEST=Off" >> $GITHUB_ENV
              echo "SDB_FAULT_INJECTION=On" >> $GITHUB_ENV
              echo "SKIP_SLOW_TESTS=false" >> $GITHUB_ENV
              echo "RUN_UNIT_TESTS=false" >> $GITHUB_ENV
              echo "RUN_INTEGRATION_TESTS=true" >> $GITHUB_ENV
              ;;
            functional_fast)
              echo "SDB_GTEST=Off" >> $GITHUB_ENV
              echo "SDB_FAULT_INJECTION=On" >> $GITHUB_ENV
              echo "SKIP_SLOW_TESTS=true" >> $GITHUB_ENV
              echo "RUN_UNIT_TESTS=false" >> $GITHUB_ENV
              echo "RUN_INTEGRATION_TESTS=true" >> $GITHUB_ENV
              ;;
            both)
              echo "SDB_GTEST=On" >> $GITHUB_ENV
              echo "SDB_FAULT_INJECTION=On" >> $GITHUB_ENV
              echo "SKIP_SLOW_TESTS=false" >> $GITHUB_ENV
              echo "RUN_UNIT_TESTS=true" >> $GITHUB_ENV
              echo "RUN_INTEGRATION_TESTS=true" >> $GITHUB_ENV
              ;;
          esac

          # DEV -> assertions
          echo "SDB_DEV=${{ inputs.DEV && 'On' || 'Off' }}" >> $GITHUB_ENV

          # INSTRUMENTATION -> sanitizer/coverage
          case "${{ inputs.INSTRUMENTATION }}" in
            none)
              echo "SANITIZERS=" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            asan)
              echo "SANITIZERS=Address" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            msan)
              echo "SANITIZERS=MemoryWithOrigins" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            tsan)
              echo "SANITIZERS=Thread" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            ubsan)
              echo "SANITIZERS=Undefined" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            coverage)
              echo "SANITIZERS=" >> $GITHUB_ENV
              echo "USE_COVERAGE=SourceBased" >> $GITHUB_ENV
              ;;
          esac

          # Common defaults
          echo "BUILDMODE=RelWithDebInfo" >> $GITHUB_ENV
          echo "USE_DEBUG_INFO=COLUMNS" >> $GITHUB_ENV
          echo "USE_IPO=Off" >> $GITHUB_ENV
          echo "SDB_ALLOC=JE" >> $GITHUB_ENV
          echo "ENSURE_VTUNE_SYMBOLS=Off" >> $GITHUB_ENV
          echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
          echo "STRIP_TARBALL=false" >> $GITHUB_ENV
          echo "DEBUG_SYMBOLS=false" >> $GITHUB_ENV

          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.PR_SHA || github.sha }}
          fetch-depth: 1
          submodules: true
          clean: true

      - name: Set sanitizer options
        if: env.SANITIZERS != '' || env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/01-ci-set-sanitizer-options.bash

      - name: Build Docker environment file
        run: ./scripts/ci/steps/02-ci-build-docker-env-file.bash

      # One-time setup required on each CI machine:
      #   sudo install -d -m 2777 /mnt/data/.ccache /mnt/data/.gtest-parallel-cache /mnt/data/.cargo-target-sqllogic /mnt/data/cores
      #   echo 'kernel.core_pattern=/mnt/data/cores/%e.%p.%t' | sudo tee /etc/sysctl.d/99-serenedb-ci.conf
      #   echo 'kernel.randomize_va_space=0' | sudo tee -a /etc/sysctl.d/99-serenedb-ci.conf
      #   sudo sysctl --system
      - name: Prepare caches
        run: |
          mkdir -p /mnt/data/.gtest-parallel-cache/${{ inputs.INSTRUMENTATION }}
          echo "GTEST_PARALLEL_CACHE_DIR=/mnt/data/.gtest-parallel-cache/${{ inputs.INSTRUMENTATION }}" >> $GITHUB_ENV

      - name: Build
        id: build
        run: |
          DOCKER_USER="$(id -u):$(id -g)"
          EXTRA_FLAGS="${{ inputs.EXTRA_CMAKE_FLAGS }}"

          # Build gtest targets
          if [[ "$SDB_GTEST" == "On" ]]; then
            docker run --rm \
              --user "$DOCKER_USER" \
              -e HOME=/serenedb \
              -e CCACHE_DIR=/.ccache \
              --cap-add=SYS_PTRACE \
              --security-opt seccomp=unconfined \
              --env-file ./docker.env \
              -e SDB_GTEST=On \
              -e BUILDMODE="$BUILDMODE" \
              -e USE_DEBUG_INFO="$USE_DEBUG_INFO" \
              -e SDB_DEV="$SDB_DEV" \
              -e SDB_FAULT_INJECTION=Off \
              -e USE_IPO=Off \
              -e USE_COVERAGE="$USE_COVERAGE" \
              -e ENSURE_VTUNE_SYMBOLS=Off \
              -e BUILD_DIR=build_gtest \
              ${EXTRA_FLAGS:+-e EXTRA_CMAKE_FLAGS="$EXTRA_FLAGS"} \
              -v "${WORKSPACE}:/serenedb" \
              -v /mnt/data/.ccache:/.ccache \
              "${BUILD_IMAGE}" /serenedb/scripts/ci/build.bash vpack-tests serenedb-tests_basics serenedb-tests_connector iresearch-tests fuerte-tests
          fi

          # Build serened for functional tests
          if [[ "$SDB_FAULT_INJECTION" == "On" ]]; then
            docker run --rm \
              --user "$DOCKER_USER" \
              -e HOME=/serenedb \
              -e CCACHE_DIR=/.ccache \
              --cap-add=SYS_PTRACE \
              --security-opt seccomp=unconfined \
              --env-file ./docker.env \
              -e SDB_GTEST=Off \
              -e BUILDMODE="$BUILDMODE" \
              -e USE_DEBUG_INFO="$USE_DEBUG_INFO" \
              -e SDB_DEV="$SDB_DEV" \
              -e SDB_FAULT_INJECTION=On \
              -e USE_IPO=Off \
              -e USE_COVERAGE="$USE_COVERAGE" \
              -e ENSURE_VTUNE_SYMBOLS=Off \
              -e BUILD_DIR=build_tests \
              ${EXTRA_FLAGS:+-e EXTRA_CMAKE_FLAGS="$EXTRA_FLAGS"} \
              -v "${WORKSPACE}:/serenedb" \
              -v /mnt/data/.ccache:/.ccache \
              "${BUILD_IMAGE}" /serenedb/scripts/ci/build.bash serenedb tzdata
          fi

          # Build-only compile check (KIND=none)
          if [[ "$SDB_GTEST" == "Off" && "$SDB_FAULT_INJECTION" == "Off" ]]; then
            docker run --rm \
              --user "$DOCKER_USER" \
              -e HOME=/serenedb \
              -e CCACHE_DIR=/.ccache \
              --cap-add=SYS_PTRACE \
              --security-opt seccomp=unconfined \
              --env-file ./docker.env \
              -e SDB_GTEST=Off \
              -e BUILDMODE="$BUILDMODE" \
              -e USE_DEBUG_INFO="$USE_DEBUG_INFO" \
              -e SDB_DEV="$SDB_DEV" \
              -e SDB_FAULT_INJECTION=Off \
              -e USE_IPO=Off \
              -e USE_COVERAGE= \
              -e ENSURE_VTUNE_SYMBOLS=Off \
              -e BUILD_DIR=build \
              ${EXTRA_FLAGS:+-e EXTRA_CMAKE_FLAGS="$EXTRA_FLAGS"} \
              -v "${WORKSPACE}:/serenedb" \
              -v /mnt/data/.ccache:/.ccache \
              "${BUILD_IMAGE}" /serenedb/scripts/ci/build.bash serenedb tzdata
          fi

          mkdir -p cores

      - name: Run gtest suites
        id: gtest
        if: steps.build.outcome == 'success' && env.RUN_UNIT_TESTS == 'true'
        run: BUILD_DIR=build_gtest ./scripts/ci/steps/04a-ci-run-gtest-suites.bash

      - name: Run integration tests
        id: integration
        if: steps.build.outcome == 'success' && env.RUN_INTEGRATION_TESTS == 'true'
        run: BUILD_DIR=build_tests ./scripts/ci/steps/04b-ci-run-integration-tests.bash

      - name: Generate coverage report
        if: steps.build.outcome == 'success' && env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/06-ci-in-docker-generate-coverage-report.bash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ inputs.KIND }}-${{ inputs.INSTRUMENTATION }}-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            cmake_*.log
            make_*.log
            ccache_*.log
            vpack-tests.log
            iresearch-tests.log
            serenedb-tests.log
            sqllogic-tests.log
            recovery-tests.log
            vpack-tests.xml
            iresearch-tests.xml
            serenedb-tests*.xml
            tests/sqllogic/*.xml
            sanitizers/
            build*/coverage/
            logs/
          if-no-files-found: ignore
          retention-days: 30
