name: SereneDB-Build-Base

on:
  workflow_call:
    inputs:
      PRESET:
        description: "Build preset"
        type: string
        required: true
        default: "build"
      LOCATION:
        description: "Where the load is executed"
        type: string
        required: true
        default: "X64"
      BRANCH:
        description: "SereneDB branch to test (defaults to current branch)"
        type: string
        required: false
        default: ""
      EXTRA_ARTIFACTS:
        description: "Keep these artifacts additionally"
        type: string
        required: false
        default: ""
      BUILD_CONFIG:
        description: "JSON configuration for builds and job settings"
        type: string
        required: false
        default: '{"BUILD_IMAGE":"serenedb/serenedb-build-ubuntu:latest","DEBUG_PRINT_ENV":"false"}'
      SERENEDB_VERSION_PATCH:
        description: "Version patch number for release builds (>0). Leave empty to auto-increment from latest GitHub release."
        required: false
        type: string
        default: ""
    secrets:
      PAT_TOKEN:
        required: true
      TG_TOKEN:
        required: true
      TG_CHAT_ID:
        required: true
      TG_USER_MAP:
        required: true

env:
  WORKSPACE: ${{ github.workspace }}
  BUILD_CONFIG: ${{ inputs.BUILD_CONFIG }}
  # Defaults from BUILD_CONFIG (overridden at runtime by the Load preset step)
  BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest
  DEBUG_PRINT_ENV: "false"

jobs:
  build-test-package:
    name: Build, Test & Package
    permissions:
      statuses: write
      contents: write
    runs-on:
      - ${{ inputs.LOCATION }}

    steps:
      # ==================== CHECKOUT ====================
      - name: Load preset & fix git
        run: |
          case "${{ inputs.PRESET }}" in
            asan)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=false" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=Address" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            tsan)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=false" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=Thread" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            msan)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=false" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=MemoryWithOrigins" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            ubsan)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=false" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=Undefined" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            coverage)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=true" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=" >> $GITHUB_ENV
              echo "USE_COVERAGE=SourceBased" >> $GITHUB_ENV
              ;;
            build)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=true" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
              echo "SANITIZERS=" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
            release)
              echo "ENABLE_GTEST_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_TESTS_BUILD=true" >> $GITHUB_ENV
              echo "ENABLE_RELEASE_BUILD=true" >> $GITHUB_ENV
              echo "DEB_TAR_PACKAGES=true" >> $GITHUB_ENV
              echo "SANITIZERS=" >> $GITHUB_ENV
              echo "USE_COVERAGE=" >> $GITHUB_ENV
              ;;
          esac

          BRANCH="${{ inputs.BRANCH }}"
          if [[ -z "$BRANCH" ]]; then
            BRANCH="$GITHUB_REF_NAME"
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          BUILD_CONFIG='${{ inputs.BUILD_CONFIG }}'
          if [[ -n "$BUILD_CONFIG" && "$BUILD_CONFIG" != "{}" ]]; then
            echo "$BUILD_CONFIG" | docker run --rm -i ghcr.io/jqlang/jq:1.8.1 -r 'to_entries | .[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
          fi

          git config --global --add safe.directory '*'

      - name: Resolve version patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PATCH="${{ inputs.SERENEDB_VERSION_PATCH }}"
          if [[ "${{ inputs.PRESET }}" == "release" ]]; then
            if [[ -z "$PATCH" ]]; then
              MAJOR=$(date -u +%y)
              MINOR=$(date -u +%m)
              LAST=$(gh release list --limit 100 --json tagName \
                --jq "[.[] | .tagName | ltrimstr(\"v\") | select(startswith(\"${MAJOR}.${MINOR}.\")) | ltrimstr(\"${MAJOR}.${MINOR}.\") | select(test(\"^[0-9]+\")) | split(\"-\")[0]] | map(tonumber) | max // 0" \
                2>/dev/null || echo "0")
              PATCH=$(( LAST + 1 ))
            fi
          else
            PATCH="0"
          fi
          echo "SERENEDB_VERSION_PATCH=$PATCH" >> $GITHUB_ENV

      - name: Checkout SereneDB
        uses: actions/checkout@v6
        with:
          repository: serenedb/serenedb
          ref: ${{ env.BRANCH }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1
          submodules: true
          clean: true

      - name: Print environment
        if: env.DEBUG_PRINT_ENV == 'true'
        run: printenv

      - name: Set sanitizer options
        if: env.SANITIZERS != '' || env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/01-ci-set-sanitizer-options.bash

      - name: Build Docker environment file
        run: ./scripts/ci/steps/02-ci-build-docker-env-file.bash

      # ==================== GTEST PARALLEL CACHE ====================
      - name: Restore gtest-parallel timing cache
        id: gtest-cache
        uses: actions/cache@v4
        with:
          path: .gtest-parallel-cache
          key: gtest-times-${{ inputs.PRESET }}-${{ env.BRANCH }}-${{ github.run_number }}
          restore-keys: |
            gtest-times-${{ inputs.PRESET }}-${{ env.BRANCH }}-
            gtest-times-${{ inputs.PRESET }}-main-
            gtest-times-${{ inputs.PRESET }}-

      - name: Prepare gtest-parallel cache directory
        run: |
          mkdir -p .gtest-parallel-cache
          echo "GTEST_PARALLEL_CACHE_DIR=${WORKSPACE}/.gtest-parallel-cache" >> $GITHUB_ENV

      # ==================== BUILD ====================
      - name: SereneDB build
        id: serenedb_build
        run: ./scripts/ci/steps/03-ci-in-docker-build-targets.bash

      # ==================== TESTS ====================
      - name: Run tests
        id: run_tests
        if: steps.serenedb_build.outcome == 'success'
        run: ./scripts/ci/steps/04-ci-run-tests.bash

      # ==================== PACKAGES ====================
      - name: SereneDB Packages
        id: serenedb_packages
        if: steps.serenedb_build.outcome == 'success' && env.ENABLE_RELEASE_BUILD == 'true'
        run: ./scripts/ci/steps/05-ci-in-docker-package.bash

      # ==================== RELEASE TEST AUTOMATION ====================
      - name: Release Test Automation (RTA)
        id: rta
        if: steps.serenedb_packages.outcome == 'success' && env.DEB_TAR_PACKAGES == 'true'
        run: ./scripts/ci/steps/08-ci-rta.bash

      # ==================== COVERAGE REPORT ====================
      - name: Generate coverage report
        id: coverage_report
        if: steps.serenedb_build.outcome == 'success' && env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/06-ci-in-docker-generate-coverage-report.bash

      # ==================== UPLOAD RELEASE TARBALL ====================
      - name: Upload release tarball
        if: steps.serenedb_packages.outcome == 'success' && env.DEB_TAR_PACKAGES == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ inputs.LOCATION }}
          path: packages/tarball/install-*.tar.gz
          retention-days: 1

      # ==================== UPDATE FILE OWNERSHIP ====================
      - name: Update file ownership
        if: always()
        run: ./scripts/ci/steps/07-ci-in-docker-update-file-ownership.bash

      # ==================== DETERMINE FINAL STATUS ====================
      - name: Determine final job status
        id: final_status
        if: always() && !cancelled()
        run: |
          HAS_FAILURES=false

          if [[ "${{ steps.serenedb_build.outcome }}" == "failure" ]]; then
            echo "Build failed"
            HAS_FAILURES=true
          fi

          if [[ "${{ steps.run_tests.outcome }}" == "failure" ]]; then
            echo "Tests failed"
            HAS_FAILURES=true
          fi

          if [[ "${{ steps.serenedb_packages.outcome }}" == "failure" ]]; then
            echo "Packages failed"
            HAS_FAILURES=true
          fi

          if [[ "${{ steps.coverage_report.outcome }}" == "failure" ]]; then
            echo "Coverage report generation failed"
            HAS_FAILURES=true
          fi

          if [[ "${{ steps.rta.outcome }}" == "failure" ]]; then
            echo "RTA failed"
            HAS_FAILURES=true
          fi

          echo "HAS_FAILURES=$HAS_FAILURES" >> $GITHUB_ENV

      # ==================== ARTIFACTS ====================
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            binaries.tar.gz
            build_description.txt
            cmake*.log
            make*.log
            ccache*.log
            check-log-ids.log
            clang-format.log
            clang-format.diff
            vpack-tests.log
            iresearch-tests.log
            sqllogic-tests.log
            recovery-tests.log
            rta-tests.log
            serenedb-tests*.log
            fuerte-tests.log
            tests.log
            testfailures.txt
            testreport-*.tar*
            testRuns.html
            testProtocol.txt
            test.log
            crashreport-*.tar*
            sanitizers/**/*
            build/coverage/**/*
            logs/*
          if-no-files-found: ignore
          retention-days: 30

      - name: Archive package artifacts
        if: steps.serenedb_packages.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            *.deb
            *.tar.gz
          if-no-files-found: ignore

      - name: Upload extra artifacts
        if: always() && !cancelled() && inputs.EXTRA_ARTIFACTS != ''
        uses: actions/upload-artifact@v4
        with:
          name: extra-artifacts-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: ${{ inputs.EXTRA_ARTIFACTS }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            **/vpack-tests.xml
            **/iresearch-tests.xml
            **/serenedb-tests*.xml
            **/fuerte-testsXml/*.xml
            **/testrunXml/**/*.xml
            **/tests/sqllogic/*.xml
            logs/rta-tests*.xml
          if-no-files-found: ignore
          retention-days: 30

      # ==================== CLEANUP ====================
      - name: Docker cleanup
        if: always() && !cancelled()
        run: |
          docker system prune -f || true
          docker volume prune -f || true

      # ==================== TELEGRAM NOTIFICATION ====================
      - name: Send Telegram notification
        if: always() && !cancelled()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: ${{ env.BRANCH }}
          JOB_STATUS: ${{ env.HAS_FAILURES == 'true' && 'failure' || 'success' }}
          ACTOR: ${{ contains(inputs.BUILD_CONFIG, 'TRIGGERED_BY') && fromJSON(inputs.BUILD_CONFIG).TRIGGERED_BY || github.actor }}
          RUN_NAME: "SereneDB [${{ inputs.PRESET }}]"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/notify_telegram.bash

      # ==================== REPORT PR COMMIT STATUS ====================
      - name: Update PR commit status
        if: always() && !cancelled() && contains(inputs.BUILD_CONFIG, 'PR_SHA')
        uses: actions/github-script@v7
        with:
          script: |
            const config = JSON.parse(process.env.BUILD_CONFIG);
            const state = process.env.HAS_FAILURES === 'true' ? 'failure' : 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: config.PR_SHA,
              state: state,
              description: state === 'success' ? 'Build succeeded' : 'Build failed',
              context: config.PR_STATUS_CONTEXT,
              target_url: runUrl,
            });
        env:
          BUILD_CONFIG: ${{ inputs.BUILD_CONFIG }}
          HAS_FAILURES: ${{ env.HAS_FAILURES }}

      # ==================== FAIL JOB IF ANY STAGE FAILED ====================
      - name: Fail job if any stage failed
        if: always() && !cancelled() && env.HAS_FAILURES == 'true'
        run: exit 1
