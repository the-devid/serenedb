name: SereneUI-Build-Base

on:
    workflow_call:
        inputs:
            VERSION:
                description: "Version [xx.xx.x] (used as a tag)"
                required: true
                type: string
            EXTRA_DOCKER_TAGS:
                description: "Extra Docker tags [IFS= ,] (opt)"
                required: false
                type: string
                default: ""
            RUN_TESTS:
                description: "Run SereneUI screenshot tests"
                required: true
                type: boolean
                default: true
            BUILD_IMAGE:
                description: "Build SereneUI Docker image"
                required: true
                type: boolean
                default: false
            PUSH_IMAGE_TO_REGISTRY:
                description: "Push SereneUI image to Registry"
                required: true
                type: boolean
                default: false
            BUILD_LINUX_APP:
                description: "Build SereneUI Linux desktop app"
                required: true
                type: boolean
                default: false
            BUILD_WINDOWS_APP:
                description: "Build SereneUI Windows desktop app"
                required: true
                type: boolean
                default: false
            BUILD_MACOS_APP:
                description: "Build SereneUI macOS desktop app"
                required: true
                type: boolean
                default: false
            PUSH_RELEASE:
                description: "Publish a GitHub Release"
                required: true
                type: boolean
                default: false
        secrets:
            PAT_TOKEN:
                required: true
                description: "Personal Access Token with repo access"
            TG_TOKEN:
                required: true
            APPLE_ID:
                required: true
            APPLE_ID_PASSWORD:
                required: true
            APPLE_TEAM_ID:
                required: true
            TG_CHAT_ID:
                required: true
            DOCKER_PASSWORD:
                required: false
                description: "Docker registry password / token"
            TG_USER_MAP:
                required: true

jobs:
    build-docker:
        name: Build Docker Image
        if: inputs.RUN_TESTS || inputs.BUILD_IMAGE
        runs-on: X64
        permissions:
            contents: read
        timeout-minutes: 60
        defaults:
            run:
                working-directory: ./serene-ui
        env:
            WORKSPACE: ${{ github.workspace }}
            PUSH_IMAGE_TO_REGISTRY: ${{ inputs.PUSH_IMAGE_TO_REGISTRY }}
            EXTRA_DOCKER_TAGS: ${{ inputs.EXTRA_DOCKER_TAGS }}
            PUSH_RELEASE: ${{ inputs.PUSH_RELEASE }}
            DOCKER_REGISTRY: "serenedb"
            IMAGE: serene-ui
            DOCKER_TAG: ${{ inputs.VERSION }}
        steps:
            - name: Resolve branch
              working-directory: ${{ github.workspace }}
              run: echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV

            - name: Checkout SereneUI
              uses: actions/checkout@v6
              with:
                  repository: serenedb/serenedb
                  ref: ${{ env.BRANCH }}
                  token: ${{ secrets.PAT_TOKEN }}
                  path: .
                  sparse-checkout: |
                      serene-ui
                  sparse-checkout-cone-mode: true

            - name: Run tests
              if: inputs.RUN_TESTS
              run: |
                  mkdir -p logs
                  ./scripts/run_tests_docker.sh 2>&1 | tee -a logs/run.log

            - name: Update file ownership
              if: always()
              run: |
                  export RUNNER_ID="$(id -u):$(id -g)"
                  bash ./scripts/update_ownership.sh

            - name: Upload test artifacts
              if: inputs.RUN_TESTS
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-test-artifacts-docker
                  path: |
                      serene-ui/screenshots/diff/**/*
                      serene-ui/logs/**/*
                  if-no-files-found: ignore
                  retention-days: 30

            - name: Setup QEMU for multi-arch
              if: inputs.BUILD_IMAGE
              run: docker run --rm --privileged tonistiigi/binfmt --install all

            - name: Build Docker image
              if: inputs.BUILD_IMAGE
              env:
                  DOCKER_USERNAME: "serenedb"
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
              run: ./scripts/build_docker.sh

            - name: Cleanup workspace & Docker
              if: always()
              run: |
                  docker system prune -f 2>/dev/null || true
                  docker volume prune -f 2>/dev/null || true

    build-linux-app:
        name: Build Linux App
        if: inputs.RUN_TESTS || inputs.BUILD_LINUX_APP
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 30
        defaults:
            run:
                working-directory: ./serene-ui
        steps:
            - name: Resolve branch
              working-directory: ${{ github.workspace }}
              run: echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV

            - name: Checkout SereneUI
              uses: actions/checkout@v6
              with:
                  repository: serenedb/serenedb
                  ref: ${{ env.BRANCH }}
                  token: ${{ secrets.PAT_TOKEN }}
                  path: .
                  sparse-checkout: |
                      serene-ui
                  sparse-checkout-cone-mode: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies & build
              run: |
                  rm -f package-lock.json
                  npm install
                  npm run build

            - name: Install Playwright
              if: inputs.RUN_TESTS
              run: npx playwright install --with-deps

            - name: Run tests
              if: inputs.RUN_TESTS
              run: |
                  mkdir -p logs
                  ./scripts/run_tests_native.sh 2>&1 | tee -a logs/run.log

            - name: Upload test artifacts
              if: inputs.RUN_TESTS && !cancelled()
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-test-artifacts-linux
                  path: |
                      serene-ui/screenshots/diff/**/*
                      serene-ui/logs/**/*
                  if-no-files-found: ignore
                  retention-days: 30

            - name: Build Electron distributables
              if: inputs.BUILD_LINUX_APP
              working-directory: ./serene-ui/apps/electron
              run: |
                  npm run package:prod
                  npm run make:prod

            - name: Upload Linux artifacts
              if: inputs.BUILD_LINUX_APP
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-linux
                  path: serene-ui/apps/electron/out/make/**/*
                  if-no-files-found: error
                  retention-days: 30

    build-windows-app:
        name: Build Windows App
        if: inputs.RUN_TESTS || inputs.BUILD_WINDOWS_APP
        runs-on: windows-latest
        permissions:
            contents: read
        timeout-minutes: 30
        defaults:
            run:
                shell: bash
                working-directory: ./serene-ui
        steps:
            - name: Resolve branch
              working-directory: ${{ github.workspace }}
              run: echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV

            - name: Checkout SereneUI
              uses: actions/checkout@v6
              with:
                  repository: serenedb/serenedb
                  ref: ${{ env.BRANCH }}
                  token: ${{ secrets.PAT_TOKEN }}
                  path: .
                  sparse-checkout: |
                      serene-ui
                  sparse-checkout-cone-mode: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies & build
              run: |
                  rm -f package-lock.json
                  npm install
                  npm run build

            - name: Install Playwright
              if: inputs.RUN_TESTS
              run: npx playwright install

            - name: Run tests
              if: inputs.RUN_TESTS
              run: |
                  mkdir -p logs
                  ./scripts/run_tests_native.sh 2>&1 | tee -a logs/run.log

            - name: Upload test artifacts
              if: inputs.RUN_TESTS && !cancelled()
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-test-artifacts-windows
                  path: |
                      serene-ui/screenshots/diff/**/*
                      serene-ui/logs/**/*
                  if-no-files-found: ignore
                  retention-days: 30

            - name: Build Electron distributables
              if: inputs.BUILD_WINDOWS_APP
              working-directory: ./serene-ui/apps/electron
              run: |
                  npm run package:prod
                  npm run make:prod

            - name: Upload Windows artifacts
              if: inputs.BUILD_WINDOWS_APP
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-windows
                  path: serene-ui/apps/electron/out/make/**/*
                  if-no-files-found: error
                  retention-days: 30

    build-macos-app:
        name: Build macOS App
        if: inputs.RUN_TESTS || inputs.BUILD_MACOS_APP
        runs-on: macOS
        permissions:
            contents: read
        timeout-minutes: 240
        defaults:
            run:
                working-directory: ./serene-ui
        steps:
            - name: Resolve branch
              working-directory: ${{ github.workspace }}
              run: echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV

            - name: Checkout SereneUI
              uses: actions/checkout@v6
              with:
                  repository: serenedb/serenedb
                  ref: ${{ env.BRANCH }}
                  token: ${{ secrets.PAT_TOKEN }}
                  path: .
                  sparse-checkout: |
                      serene-ui
                  sparse-checkout-cone-mode: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies & build
              run: |
                  rm -f package-lock.json
                  npm install
                  npm run build

            - name: Install Playwright
              if: inputs.RUN_TESTS
              run: npx playwright install --with-deps

            - name: Run tests
              if: inputs.RUN_TESTS
              run: |
                  mkdir -p logs
                  ./scripts/run_tests_native.sh 2>&1 | tee -a logs/run.log

            - name: Upload test artifacts
              if: inputs.RUN_TESTS && !cancelled()
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-test-artifacts-macos
                  path: |
                      serene-ui/screenshots/diff/**/*
                      serene-ui/logs/**/*
                  if-no-files-found: ignore
                  retention-days: 30

            - name: Build Electron distributables
              if: inputs.BUILD_MACOS_APP
              working-directory: ./serene-ui/apps/electron
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  npm run package:prod
                  npm run make:prod

            - name: Upload macOS artifacts
              if: inputs.BUILD_MACOS_APP
              uses: actions/upload-artifact@v4
              with:
                  name: serene-ui-macos
                  path: serene-ui/apps/electron/out/make/**/*
                  if-no-files-found: error
                  retention-days: 30

    release:
        name: Publish GitHub Release
        needs: [build-linux-app, build-windows-app, build-macos-app, build-docker]
        if: >-
            always()
            && inputs.PUSH_RELEASE
            && (inputs.BUILD_LINUX_APP || inputs.BUILD_WINDOWS_APP || inputs.BUILD_MACOS_APP)
            && !contains(needs.*.result, 'failure')
        runs-on: X64
        permissions:
            contents: write
        steps:
            - name: Validate release inputs
              if: inputs.PUSH_RELEASE && inputs.VERSION == ''
              run: |
                  echo "VERSION is required when PUSH_RELEASE=true"
                  exit 1

            - name: Clean release-assets directory
              run: rm -rf "${{ github.workspace }}/release-assets"

            - name: Download Linux artifacts
              if: inputs.BUILD_LINUX_APP
              uses: actions/download-artifact@v4
              with:
                  name: serene-ui-linux
                  path: release-assets/linux

            - name: Download Windows artifacts
              if: inputs.BUILD_WINDOWS_APP
              uses: actions/download-artifact@v4
              with:
                  name: serene-ui-windows
                  path: release-assets/windows

            - name: Download macOS artifacts
              if: inputs.BUILD_MACOS_APP
              uses: actions/download-artifact@v4
              with:
                  name: serene-ui-macos
                  path: release-assets/macos

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ inputs.VERSION }}-ui
                  name: SereneUI v${{ inputs.VERSION }}
                  body: |
                      Docker image: https://hub.docker.com/r/serenedb/serene-ui/tags?name=${{ inputs.VERSION }}
                  draft: true
                  prerelease: true
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: release-assets/**/*

    notify:
        name: Send Notification
        needs:
            [
                build-docker,
                build-linux-app,
                build-windows-app,
                build-macos-app,
                release,
            ]
        if: always()
        runs-on: X64
        timeout-minutes: 5
        steps:
            - name: Resolve branch
              run: echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV

            - name: Checkout (for notify script)
              uses: actions/checkout@v6
              with:
                  repository: serenedb/serenedb
                  ref: ${{ env.BRANCH }}
                  token: ${{ secrets.PAT_TOKEN }}
                  path: .
                  sparse-checkout: |
                      scripts
                  sparse-checkout-cone-mode: true

            - name: Send Telegram notification
              env:
                  TG_TOKEN: ${{ secrets.TG_TOKEN }}
                  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
                  TG_THREAD_ID_MAIN: "51"
                  TG_THREAD_ID_BUILD: "53"
                  TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
                  BRANCH: ${{ env.BRANCH }}
                  JOB_STATUS: ${{ (contains(needs.*.result, 'failure') && 'failure') || (contains(needs.*.result, 'cancelled') && 'cancelled') || 'success' }}
                  ACTOR: ${{ github.actor }}
                  WORKFLOW: ${{ github.workflow }}
                  RUN_NUMBER: ${{ github.run_number }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  JOB_STATUS_DOCKER: ${{ needs.build-docker.result }}
                  JOB_STATUS_LINUX: ${{ needs.build-linux-app.result }}
                  JOB_STATUS_WINDOWS: ${{ needs.build-windows-app.result }}
                  JOB_STATUS_MACOS: ${{ needs.build-macos-app.result }}
                  JOB_STATUS_RELEASE: ${{ needs.release.result }}
              run: ./scripts/notify_telegram_serene-ui.bash
