name: serenedb | build & test

run-name: "serenedb | build & test [${{ inputs.LOCATION }}]"

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: 'Runner label (all = linux-amd64 + linux-arm64 in parallel)'
        type: choice
        required: true
        default: 'linux'
        options:
          - linux
          - linux-amd64
          - linux-arm64
          - all
      ENABLE_ASAN:
        description: 'Run tests with Address Sanitizer'
        type: boolean
        default: false
      ENABLE_TSAN:
        description: 'Run tests with Thread Sanitizer'
        type: boolean
        default: false
      ENABLE_MSAN:
        description: 'Run tests with Memory Sanitizer'
        type: boolean
        default: false
      FULL_SANITIZER_TESTS:
        description: 'Include slow tests for sanitizers run'
        type: boolean
        default: false
      VALIDATE_PG_TESTS:
        description: 'Validate tests with Postgres'
        type: boolean
        default: true
      PR_SHA:
        description: 'Exact commit SHA to build (fork PR support; empty = workflow ref)'
        type: string
        required: false
        default: ''
      BUILD_CONFIG:
        description: 'Internal: PR metadata (set by trigger bot)'
        type: string
        required: false
        default: '{}'

permissions:
  statuses: write
  contents: write

concurrency:
  group: build-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: unit ${{ matrix.instrumentation }} (${{ matrix.location }})
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
        instrumentation: ${{ fromJSON(format('["{0}"{1}{2}{3}]', 'none', inputs.ENABLE_ASAN && ',"asan"' || '', inputs.ENABLE_TSAN && ',"tsan"' || '', inputs.ENABLE_MSAN && ',"msan"' || '')) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      KIND: unit
      DEV: true
      INSTRUMENTATION: ${{ matrix.instrumentation }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  test-functional:
    name: functional ${{ matrix.instrumentation }} (${{ matrix.location }})
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
        instrumentation: ${{ fromJSON(format('["{0}"{1}{2}{3}]', 'none', inputs.ENABLE_ASAN && ',"asan"' || '', inputs.ENABLE_TSAN && ',"tsan"' || '', inputs.ENABLE_MSAN && ',"msan"' || '')) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      KIND: ${{ matrix.instrumentation == 'none' && 'functional' || (inputs.FULL_SANITIZER_TESTS && 'functional' || 'functional_fast') }}
      DEV: true
      INSTRUMENTATION: ${{ matrix.instrumentation }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  compile-check:
    name: compile check (${{ matrix.location }})
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      KIND: none
      DEV: false
      INSTRUMENTATION: none
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  validate-pg:
    name: validate pg
    if: inputs.VALIDATE_PG_TESTS
    uses: ./.github/workflows/validate-pg-tests.yml
    with:
      LOCATION: linux
      PR_SHA: ${{ inputs.PR_SHA }}
      BUILD_CONFIG: ${{ inputs.BUILD_CONFIG }}
    secrets: inherit

  report:
    name: Report Status
    needs: [test-unit, test-functional, compile-check, validate-pg]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for notify script)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          clean: false
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true

      - name: Send notification
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: ${{ github.ref_name }}
          JOB_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          ACTOR: ${{ contains(inputs.BUILD_CONFIG, 'TRIGGERED_BY') && fromJSON(inputs.BUILD_CONFIG).TRIGGERED_BY || github.actor }}
          RUN_NAME: "serenedb | build & test [${{ inputs.LOCATION }}]"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/send_notification.bash

      - name: Update PR commit status
        if: contains(inputs.BUILD_CONFIG, 'PR_SHA')
        uses: actions/github-script@v8
        with:
          script: |
            const config = JSON.parse(process.env.BUILD_CONFIG);
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: config.PR_SHA,
              state: state,
              description: state === 'success' ? 'All checks passed' : 'Some checks failed',
              context: config.PR_STATUS_CONTEXT || 'serenedb | build & test',
              target_url: runUrl,
            });
        env:
          BUILD_CONFIG: ${{ inputs.BUILD_CONFIG }}
          JOB_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
