name: Jobs Schedule

on:
  schedule:
    # Daily coverage build - every day at 05:00-08:00 UTC
    - cron: '0 5 * * *'
    # Monday - MemoryWithOrigins sanitizer at 01:00-05:00 UTC
    - cron: '0 1 * * 1'
    # Tuesday - Address sanitizer
    - cron: '0 1 * * 2'
    # Wednesday - Undefined sanitizer
    - cron: '0 1 * * 3'
    # Thursday - Thread sanitizer
    - cron: '0 1 * * 4'

jobs:
  # Daily coverage build
  coverage-daily:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/build-reusable.yml
    with:
      PRESET: 'coverage'
      LOCATION: 'X64'
      BRANCH: 'main'
      BUILD_CONFIG: '{"SDB_ALLOC":"JE","SDB_DEV":"On","USE_IPO":"Off","ENSURE_VTUNE_SYMBOLS":"Off","BUILDMODE":"RelWithDebInfo","USE_DEBUG_INFO":"COLUMNS"}'
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_USER_MAP: ${{ secrets.TG_USER_MAP }}

  # Monday - MemoryWithOrigins sanitizer
  sanitizer-memory:
    if: github.event.schedule == '0 1 * * 1'
    uses: ./.github/workflows/build-reusable.yml
    with:
      PRESET: 'msan'
      LOCATION: 'X64'
      BRANCH: 'main'
      BUILD_CONFIG: '{"SDB_ALLOC":"JE","SDB_DEV":"On","USE_IPO":"Off","ENSURE_VTUNE_SYMBOLS":"Off","BUILDMODE":"RelWithDebInfo","USE_DEBUG_INFO":"COLUMNS"}'
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_USER_MAP: ${{ secrets.TG_USER_MAP }}

  # Tuesday - Address sanitizer
  sanitizer-address:
    if: github.event.schedule == '0 1 * * 2'
    uses: ./.github/workflows/build-reusable.yml
    with:
      PRESET: 'asan'
      LOCATION: 'X64'
      BRANCH: 'main'
      BUILD_CONFIG: '{"SDB_ALLOC":"JE","SDB_DEV":"On","USE_IPO":"Off","ENSURE_VTUNE_SYMBOLS":"Off","BUILDMODE":"RelWithDebInfo","USE_DEBUG_INFO":"COLUMNS"}'
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_USER_MAP: ${{ secrets.TG_USER_MAP }}

  # Wednesday - Undefined sanitizer
  sanitizer-undefined:
    if: github.event.schedule == '0 1 * * 3'
    uses: ./.github/workflows/build-reusable.yml
    with:
      PRESET: 'ubsan'
      LOCATION: 'X64'
      BRANCH: 'main'
      BUILD_CONFIG: '{"SDB_ALLOC":"JE","SDB_DEV":"On","USE_IPO":"Off","ENSURE_VTUNE_SYMBOLS":"Off","BUILDMODE":"RelWithDebInfo","USE_DEBUG_INFO":"COLUMNS"}'
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_USER_MAP: ${{ secrets.TG_USER_MAP }}

  # Thursday - Thread sanitizer
  sanitizer-thread:
    if: github.event.schedule == '0 1 * * 4'
    uses: ./.github/workflows/build-reusable.yml
    with:
      PRESET: 'tsan'
      LOCATION: 'X64'
      BRANCH: 'main'
      BUILD_CONFIG: '{"SDB_ALLOC":"JE","SDB_DEV":"On","USE_IPO":"Off","ENSURE_VTUNE_SYMBOLS":"Off","BUILDMODE":"RelWithDebInfo","USE_DEBUG_INFO":"COLUMNS"}'
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
