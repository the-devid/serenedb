name: auto | pr trigger

on:
  pull_request_target:
    types: [opened, labeled]
  issue_comment:
    types: [edited]

concurrency:
  group: pr-build-trigger-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  post-checkboxes:
    if: >-
      github.event_name == 'pull_request_target' && (
        github.event.action == 'opened' ||
        (github.event.action == 'labeled' && github.event.label.name == 'spawn-build-bot')
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Post build triggers comment
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              '<!-- serenedb-ci-trigger -->',
              '### CI Triggers',
              '_Check **Trigger Jobs** to start. Optionally enable extra checks below._',
              '',
              '#### Extra (optional)',
              '- [ ] All architectures (amd64 + arm64)',
              '- [ ] ASAN',
              '- [ ] TSAN',
              '- [ ] MSAN',
              '',
              '---',
              '- [ ] **Trigger Jobs**',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

            if (context.payload.action === 'labeled') {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'spawn-build-bot',
              }).catch(() => {});
            }

  trigger-build:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, '<!-- serenedb-ci-trigger -->') &&
      contains(github.event.comment.body, '- [x] **Trigger Jobs**')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', pr.head.sha);
            core.setOutput('base_ref', pr.base.ref);

      - name: Parse options and trigger build
        env:
          PR_BRANCH: ${{ steps.pr-info.outputs.branch }}
          PR_SHA: ${{ steps.pr-info.outputs.sha }}
          BASE_REF: ${{ steps.pr-info.outputs.base_ref }}
        uses: actions/github-script@v8
        with:
          script: |
            const comment = context.payload.comment;
            const body = comment.body || '';
            const branch = process.env.PR_BRANCH;
            const sha = process.env.PR_SHA;
            const baseRef = process.env.BASE_REF;

            const isChecked = (label) => body.includes(`- [x] ${label}`);

            const allArch = isChecked('All architectures');
            const enableAsan = isChecked('ASAN');
            const enableTsan = isChecked('TSAN');
            const enableMsan = isChecked('MSAN');

            const { owner, repo } = context.repo;
            const statusContext = 'serenedb | build & test';

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'pending',
              description: 'Build queued',
              context: statusContext,
            });

            // Cancel in-progress runs on the base branch
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'build-manual.yml', branch: baseRef,
              status: 'in_progress', per_page: 10,
            });
            for (const run of runs.workflow_runs) {
              core.info(`Cancelling run #${run.id} (${run.status})`);
              await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id }).catch(() => {});
            }
            // Also cancel queued/waiting runs
            const { data: queued } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'build-manual.yml', branch: baseRef,
              status: 'queued', per_page: 10,
            });
            for (const run of queued.workflow_runs) {
              core.info(`Cancelling queued run #${run.id}`);
              await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id }).catch(() => {});
            }

            // Snapshot latest run ID before dispatch
            const { data: before } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'build-manual.yml', branch: baseRef, per_page: 1,
            });
            const prevId = before.workflow_runs[0]?.id || 0;

            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'build-manual.yml',
              ref: baseRef,
              inputs: {
                LOCATION: allArch ? 'all' : 'linux-amd64',
                ENABLE_ASAN: enableAsan.toString(),
                ENABLE_TSAN: enableTsan.toString(),
                ENABLE_MSAN: enableMsan.toString(),
                VALIDATE_PG_TESTS: 'true',
                PR_SHA: sha,
                BUILD_CONFIG: JSON.stringify({
                  TRIGGERED_BY: context.actor,
                  PR_SHA: sha,
                  PR_STATUS_CONTEXT: statusContext,
                }),
              },
            });

            // Wait for the new run to appear (up to 30s)
            let runUrl = `${context.serverUrl}/${owner}/${repo}/actions/workflows/build-manual.yml?query=branch%3A${encodeURIComponent(baseRef)}`;
            for (let i = 0; i < 6; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const { data: after } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: 'build-manual.yml', branch: baseRef, per_page: 3,
              });
              const run = after.workflow_runs.find(r => r.id > prevId);
              if (run) {
                runUrl = run.html_url;
                break;
              }
            }

            // Update pending status with run URL so the check is clickable in PR
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'pending',
              description: 'Build in progress',
              context: statusContext,
              target_url: runUrl,
            });

            const opts = [
              enableAsan && 'asan',
              enableTsan && 'tsan',
              enableMsan && 'msan',
              allArch && 'all arch',
            ].filter(Boolean);
            const optsStr = opts.length > 0 ? opts.join(', ') : 'default';
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const latestEntry = `**Latest:** ${optsStr} | [View Run](${runUrl}) | ${timestamp}`;

            // Update the original comment: uncheck "Trigger Jobs" and update results
            let updatedBody = body.replace('- [x] **Trigger Jobs**', '- [ ] **Trigger Jobs**');

            // Results are stored as JSON in a hidden HTML comment for reliable parsing
            const dataRe = /<!-- ci-data:(.*?) -->/;
            const dataMatch = updatedBody.match(dataRe);
            const history = dataMatch ? JSON.parse(dataMatch[1]) : [];
            history.push({ opts: optsStr, url: runUrl, time: timestamp });

            // Build visible output
            const latest = history[history.length - 1];
            let resultsBlock = `\n\n**Latest:** ${latest.opts} · [View Run](${latest.url}) · ${latest.time}`;

            if (history.length > 1) {
              const oldRuns = history.slice(0, -1).reverse().map(r =>
                `| ${r.opts} | [View Run](${r.url}) | ${r.time} |`
              );
              resultsBlock += [
                '',
                '',
                '<details><summary>Previous runs</summary>',
                '',
                '| Options | Link | Time |',
                '|---------|------|------|',
                ...oldRuns,
                '',
                '</details>',
              ].join('\n');
            }

            // Replace or append results section
            const sectionRe = /\n\n<!-- ci-data:.*? -->[\s\S]*$/;
            const newData = `\n\n<!-- ci-data:${JSON.stringify(history)} -->${resultsBlock}`;
            if (sectionRe.test(updatedBody)) {
              updatedBody = updatedBody.replace(sectionRe, newData);
            } else {
              updatedBody += newData;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              body: updatedBody,
            });
