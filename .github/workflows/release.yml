name: serenedb | make release

run-name: "serenedb | make release [${{ inputs.BUILD_AMD64 && inputs.BUILD_ARM64 && 'amd64+arm64' || inputs.BUILD_AMD64 && 'amd64' || 'arm64' }}]"

on:
  workflow_dispatch:
    inputs:
      SERENEDB_VERSION_PATCH:
        description: 'Version patch number (>0). Leave empty to auto-increment.'
        required: false
        type: string
        default: ''
      RTA:
        description: 'RTA mode: off, test (warn on failure), required (block push/release on failure)'
        required: true
        type: choice
        options:
          - required
          - test
          - off
        default: required
      PUSH_IMAGES_2_REGISTRY:
        description: 'Push Docker images to Docker Hub'
        required: true
        type: boolean
        default: false
      CREATE_GITHUB_RELEASE:
        description: 'Create a GitHub Release draft'
        required: true
        type: boolean
        default: false
      DOCKER_EXTRA_TAGS:
        description: 'Optional extra Docker tags (comma-separated)'
        required: false
        type: string
        default: ''
      BUILD_AMD64:
        description: 'Build for amd64'
        required: true
        type: boolean
        default: true
      BUILD_ARM64:
        description: 'Build for arm64'
        required: true
        type: boolean
        default: true

permissions:
  statuses: write
  contents: write
  actions: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Resolve version patch
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PATCH="${{ inputs.SERENEDB_VERSION_PATCH }}"
          if [[ -z "$PATCH" ]]; then
            MAJOR=$(date -u +%y)
            MINOR=$(date -u +%m)
            LAST=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName \
              --jq "[.[] | .tagName | ltrimstr(\"v\") | select(startswith(\"${MAJOR}.${MINOR}.\")) | ltrimstr(\"${MAJOR}.${MINOR}.\") | select(test(\"^[0-9]+\")) | split(\"-\")[0]] | map(tonumber) | max // 0" \
              2>/dev/null || echo "0")
            PATCH=$(( LAST + 1 ))
          fi
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

  build-amd64:
    if: inputs.BUILD_AMD64
    needs: [resolve-version]
    uses: ./.github/workflows/make-package.yml
    with:
      LOCATION: linux-amd64
      RTA: ${{ inputs.RTA }}
      UPLOAD_ARTIFACTS: true
      SERENEDB_VERSION_PATCH: ${{ needs.resolve-version.outputs.patch }}
    secrets: inherit

  build-arm64:
    if: inputs.BUILD_ARM64
    needs: [resolve-version]
    uses: ./.github/workflows/make-package.yml
    with:
      LOCATION: linux-arm64
      RTA: ${{ inputs.RTA }}
      UPLOAD_ARTIFACTS: true
      SERENEDB_VERSION_PATCH: ${{ needs.resolve-version.outputs.patch }}
    secrets: inherit

  release:
    name: Docker & Release
    needs: [resolve-version, build-amd64, build-arm64]
    if: >-
      always() && !cancelled() &&
      (needs.build-amd64.outputs.packages_ok == 'true' || needs.build-arm64.outputs.packages_ok == 'true')
    runs-on:
      - linux-amd64
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          clean: true

      - name: Init test runner submodule
        run: git submodule update --init --depth 1 third_party/sqllogictest-rs

      - name: Set version
        run: |
          PATCH="${{ needs.resolve-version.outputs.patch }}"
          echo "SERENEDB_VERSION_PATCH=$PATCH" >> $GITHUB_ENV
          MAJOR=$(date -u +%y)
          MINOR=$(date -u +%m)
          echo "DOCKER_TAG=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Download amd64 packages
        if: needs.build-amd64.outputs.packages_ok == 'true'
        uses: actions/download-artifact@v8
        with:
          name: packages-linux-amd64
          path: packages/linux-amd64/

      - name: Download arm64 packages
        if: needs.build-arm64.outputs.packages_ok == 'true'
        uses: actions/download-artifact@v8
        with:
          name: packages-linux-arm64
          path: packages/linux-arm64/

      - name: Prepare packages
        id: prepare
        run: |
          # Create install-{arch}.tar.gz symlinks for build_docker.bash
          mkdir -p packages/tarball
          for arch_dir in packages/linux-*; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir" | sed 's/linux-//')
            tarball=$(find "$arch_dir" -maxdepth 1 -name "serenedb-*-linux-${arch}.tar.gz" | head -1)
            if [ -n "$tarball" ]; then
              ln -sf "$(realpath "$tarball")" "packages/tarball/install-${arch}.tar.gz"
            fi
          done

          HAS_TARBALLS=false
          for f in packages/tarball/install-*.tar.gz; do
            [ -e "$f" ] && HAS_TARBALLS=true
          done
          echo "has_tarballs=$HAS_TARBALLS" >> "$GITHUB_OUTPUT"

          # Collect packages for GitHub release
          mkdir -p release-packages
          find packages/ -name "serenedb*.deb" -exec cp {} release-packages/ \;
          find packages/ -name "serenedb-*.tar.gz" -exec cp {} release-packages/ \;

          echo "Available tarballs:"
          ls -la packages/tarball/install-*.tar.gz 2>/dev/null || echo "  (none)"
          echo "Available release packages:"
          ls -la release-packages/ 2>/dev/null || echo "  (none)"

      - name: Setup QEMU
        if: steps.prepare.outputs.has_tarballs == 'true'
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Build Docker images
        id: docker_build
        if: steps.prepare.outputs.has_tarballs == 'true'
        env:
          DOCKER_REGISTRY: serenedb
          DOCKER_TAG: ${{ env.DOCKER_TAG }}
        run: ./packages/build_docker.bash

      - name: Docker RTA
        id: docker_rta
        if: inputs.RTA != 'off' && steps.docker_build.outcome == 'success'
        continue-on-error: ${{ inputs.RTA == 'test' }}
        env:
          DOCKER_TEST_IMAGE: serenedb/serenedb:${{ env.DOCKER_TAG }}-amd64
          BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest
          WORKSPACE: ${{ github.workspace }}
        run: ./scripts/ci/steps/08-ci-docker-rta.bash

      - name: Push Docker images
        if: >-
          inputs.PUSH_IMAGES_2_REGISTRY &&
          steps.docker_build.outcome == 'success' &&
          (inputs.RTA != 'required' || steps.docker_rta.outcome == 'success')
        env:
          DOCKER_REGISTRY: serenedb
          DOCKER_USERNAME: serenedb
          DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_TOKEN }}
          # 'latest' is appended automatically when creating a GitHub release
          DOCKER_EXTRA_TAGS: >-
            ${{ inputs.CREATE_GITHUB_RELEASE
              && (inputs.DOCKER_EXTRA_TAGS != '' && format('{0},latest', inputs.DOCKER_EXTRA_TAGS) || 'latest')
              || inputs.DOCKER_EXTRA_TAGS }}
          DOCKER_TAG: ${{ env.DOCKER_TAG }}
        run: ./packages/push_docker.bash

      - name: Create GitHub Release
        if: >-
          inputs.CREATE_GITHUB_RELEASE &&
          steps.prepare.outputs.has_tarballs == 'true' &&
          (inputs.RTA != 'required' || steps.docker_rta.outcome == 'success')
        env:
          GH_TOKEN: ${{ github.token }}
          DOCKER_TAG: ${{ env.DOCKER_TAG }}
        run: |
          TAG="v${DOCKER_TAG}"
          TITLE="SereneDB ${TAG}"
          BODY="Docker image: https://hub.docker.com/r/serenedb/serenedb/tags?name=${DOCKER_TAG}"

          ASSETS=()
          for f in release-packages/*.deb release-packages/*.tar.gz; do
            [ -e "$f" ] && ASSETS+=("$f")
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "::error::No packages found, skipping GitHub release"
            exit 1
          fi

          gh release create "${TAG}" \
            --draft \
            --title "${TITLE}" \
            --notes "${BODY}" \
            "${ASSETS[@]}"

      - name: Delete package artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for name in packages-linux-amd64 packages-linux-arm64; do
            ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${name}\") | .id" 2>/dev/null || true)
            if [[ -n "$ARTIFACT_ID" ]]; then
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}" || true
              echo "Deleted artifact: ${name}"
            fi
          done

      - name: Send notification
        if: always() && !cancelled()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: ${{ github.ref_name }}
          JOB_STATUS: >-
            ${{
              (needs.build-amd64.result == 'success' || needs.build-amd64.result == 'skipped') &&
              (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped')
                && 'success'
                || (needs.build-amd64.outputs.packages_ok == 'true' || needs.build-arm64.outputs.packages_ok == 'true')
                  && 'warning'
                  || 'failure'
            }}
          ACTOR: ${{ github.actor }}
          RUN_NAME: "serenedb | make release"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/send_notification.bash
