services:
  serenedb:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    tmpfs:
      - /var/lib/serenedb
      - /var/log/serenedb
    volumes:
      - "${WORKSPACE}:/workspace:ro"
      - "${WORKSPACE}/logs:/logs"
    environment:
      - HOME=/tmp
      - TARBALL_NAME
    networks:
      - rta-network
    command: >
      sh -c '
        mkdir -p /tmp/serenedb &&
        tar -xzf /workspace/$TARBALL_NAME -C /tmp/serenedb --strip-components=1 &&
        exec /tmp/serenedb/usr/bin/serened \
          --config /tmp/serenedb/etc/serenedb/serened.conf \
          --server.endpoint pgsql+tcp://0.0.0.0:7890 \
          --server.authentication 0
      '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      - serenedb
    volumes:
      - "${WORKSPACE}:/serenedb"
      - "${WORKSPACE}/logs:/logs"
      - "${WORKSPACE}/out/drivers-tests:/out"
    environment:
      - HOME=/tmp/home
      - LOG_DIR=/logs
    networks:
      - rta-network
    command: >
      sh -c '
        echo "Waiting for serened..." &&
        for i in $(seq 1 60); do
          bash -c "echo > /dev/tcp/serenedb/7890" 2>/dev/null && break
          sleep 1
        done &&
        exec /serenedb/tests/drivers/run.sh \
          --host serenedb \
          --port 7890 \
          --junit /out
      '

networks:
  rta-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_rta-network
