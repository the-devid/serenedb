# See https://pre-commit.com for more information

# General excludes, files can also be excluded on a hook level
exclude: resources/.*|third_party/.*/.*|LICENSE
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: meta
    hooks:
      # TODO(mbkkt) - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      # TODO(mbkkt) - id: pretty-format-json
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      # TODO(mbkkt) - id: detect-aws-credentials
      # TODO(mbkkt) - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: \.test$

  - repo: https://github.com/BlankSpruce/gersemi
    rev: 0.22.3
    hooks:
      - id: gersemi
        name: CMake formatter

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.2
    hooks:
      - id: clang-format
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt

  - repo: local
    hooks:
      - id: check-disclaimer
        name: Check disclaimer header
        language: python
        entry: python3 scripts/check_disclaimer.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$
      - id: check-namespace-format
        name: Check namespace formatting
        language: python
        entry: python3 scripts/check_namespace_format.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$
      - id: check-llm-symbols
        name: Check LLM Unicode symbols
        language: python
        entry: python3 scripts/check_llm_symbols.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp|py|sh|cmake|md|txt)$
      - id: check-no-anon-namespace-in-headers
        name: Check no anonymous namespace in headers
        language: python
        entry: python3 scripts/check_no_anon_namespace_in_headers.py
        files: \.(hpp|hh|h)$
      - id: check-no-fault-injection-outside-recovery
        name: Check no fault injection outside recovery folder
        language: python
        entry: python3 scripts/check_no_fault_injection_outside_recovery.py
        files: \.test
