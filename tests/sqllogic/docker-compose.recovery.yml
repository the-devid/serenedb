services:
  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    security_opt:
      - seccomp:unconfined
    volumes:
      - "${WORKSPACE}:/serenedb"
      - "${SQLLOGIC_DIR}:/sqllogic"
      - "${WORKSPACE}/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "${WORKSPACE}/logs:/var/log/serenedb"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - type: tmpfs
        target: /recovery_data
        tmpfs:
          size: 16G
    env_file:
      - "${WORKSPACE}/docker.env"
    environment:
      - BUILD_DIR
      - RESOURCES
      - WORKSPACE=/serenedb
      - HOME=/serenedb
      - LOG_DIR=/var/log/serenedb
      - CARGO_HOME=/tmp/cargo
      - CARGO_TARGET_DIR=/cargo-target
      - TMPDIR=/recovery_data
      - SKIP_SLOW_TESTS
    working_dir: /sqllogic
    command: ./run_recovery_tests.sh --runner /sqllogictest-rs
