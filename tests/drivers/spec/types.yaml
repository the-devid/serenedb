# ---- date / time ----
- oid: 1082
  name: date
  pg_typname: date
  text: true
  binary: true
  array: true
  # 9999-12-31 is asyncpg-specific: it maps Python's date.MAXYEAR to PG's
  # +infinity sentinel (INT32_MAX). Real PG accepts that, but the
  # "expected" baseline ('9999-12-31'::date::text) returns "9999-12-31"
  # while the bind path returns "infinity" -- different wire-form values
  # can't share a sample row. Use literal 'infinity' / '-infinity' instead
  # which round-trip identically across drivers.
  samples: ["1970-01-01", "2000-01-01", "2026-05-05", "infinity", "-infinity", null]

- oid: 1083
  name: time
  pg_typname: time
  text: true
  binary: true
  array: true
  samples: ["00:00:00", "12:34:56.789", "23:59:59.999999", null]

- oid: 1114
  name: timestamp
  pg_typname: timestamp
  text: true
  binary: true
  array: true
  samples:
    - "1970-01-01 00:00:00"
    - "2000-01-01 00:00:00"
    - "2026-05-05 12:34:56.789012"
    - null

- oid: 1184
  name: timestamptz
  pg_typname: timestamptz
  text: true
  binary: true
  array: true
  samples:
    - "1970-01-01 00:00:00+00"
    - "2026-05-05 12:34:56.789012+00"
    - null

- oid: 1186
  name: interval
  pg_typname: interval
  text: true
  binary: true
  array: true
  samples: ["00:00:00", "1 day", "1 year 2 mons 3 days 04:05:06.789", null]
  skip:
    # Python datetime.timedelta cannot represent year/mon components,
    # so asyncpg's strict binder rejects those samples. Simple-mode
    # literal cast still exercises the server's interval-in path.
    python_asyncpg: ["extended-text", "extended-binary"]

- oid: 1266
  name: timetz
  pg_typname: timetz
  text: true
  binary: true
  array: true
  samples: ["00:00:00+00", "12:34:56+02", null]

- oid: 1700
  name: numeric
  pg_typname: numeric
  text: true
  binary: true
  array: true
  # TODO: re-add "NaN" once SereneDB accepts it as a numeric literal.
  # PG accepts NaN; SereneDB currently raises "Could not convert".
  samples: ["0", "1", "-1", "3.14", "1234567890.0987654321", null]

