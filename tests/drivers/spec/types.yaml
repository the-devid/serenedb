# Driver-test type matrix. Source of truth for which PG types every driver
# harness must round-trip and in which formats. Reconciled against
# server/pg/pg_types.h `enum PgTypeOID` by gen/oids_from_pg_types.py (CI gate).
#
# Schema:
#   oid:            postgres OID (must match pg_types.h)
#   name:           short identifier used in test ids
#   pg_typname:     name as in pg_catalog.pg_type.typname; used in cast SQL
#   cast_sql:       SQL fragment used to cast a $1 placeholder server-side.
#                   Defaults to "$1::<pg_typname>" if absent.
#   text:           bool; whether text-format encode/decode is exercised
#   binary:         bool; whether binary-format encode/decode is exercised
#   array:          true|false|partial; partial = element type works but the
#                   array form has known driver gaps (recorded in skip)
#   samples:        list of representative values, given as text-form strings.
#                   Each driver harness is responsible for converting these
#                   to its native type. `null` is allowed and exercises the
#                   NULL bitmap path.
#   skip:           per-driver-key list of protocol modes to skip
#                   (simple | extended-noparam | extended-text | extended-binary).
#                   Use "all" to skip every mode for that driver.
#                   Driver keys are <lang>_<driver>, e.g. python_psycopg3,
#                   php_pdo, csharp_npgsql.

# ---- core scalars ----
- oid: 16
  name: bool
  pg_typname: bool
  text: true
  binary: true
  array: true
  samples: ["t", "f", null]

- oid: 17
  name: bytea
  pg_typname: bytea
  text: true
  binary: true
  array: true
  samples: ["\\x", "\\xdeadbeef", "\\x00ff", null]
  skip:
    # Drivers transparently encode str -> bytes when binding bytea, which
    # corrupts PG-escape-form samples like "\xdeadbeef". The simple and
    # extended-noparam modes inline the literal so they still exercise the
    # server's bytea-in path. Re-enable once each harness binds bytes natively
    # for every bytea test rather than passing the sample string through.
    python_psycopg3: ["extended-text", "extended-binary"]
    python_psycopg2: ["extended-text", "extended-binary"]
    python_asyncpg: ["extended-text", "extended-binary"]
    js_pg: ["extended-text", "extended-binary"]
    js_postgres_js: ["extended-text", "extended-binary"]
    java_pgjdbc: ["extended-text", "extended-binary"]
    go_pgx: ["extended-text", "extended-binary"]
    go_libpq: ["extended-text", "extended-binary"]
    rust_tokio_postgres: ["extended-text", "extended-binary"]
    rust_sqlx: ["extended-text", "extended-binary"]
    csharp_npgsql: ["extended-text", "extended-binary"]
    php_pdo: ["extended-text", "extended-binary"]

