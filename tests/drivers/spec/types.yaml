- oid: 26
  name: oid
  pg_typname: oid
  text: true
  binary: true
  array: true
  # 4294967295 (uint32_max) was here but asyncpg sends oid as int32 and
  # truncates to -1, then server roundtrips -1 back. Use values that
  # fit signed int32 to avoid the driver/server signedness mismatch.
  samples: ["0", "16", "1234567", null]

