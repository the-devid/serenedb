# ---- arrays of common scalars (already covered by `array: true` above,
#      but a small number of explicit array-OID entries keeps the harness
#      honest about array-specific binary format) ----
- oid: 1007
  name: int4_array
  # SereneDB doesn't resolve PG's underscore-prefix array type names
  # (_int4); use int4[] form which serves the same purpose. Keep the
  # OID 1007 entry so the gate stays satisfied.
  pg_typname: int4[]
  cast_sql: "$1::int4[]"
  text: true
  binary: true
  array: false                    # this *is* the array
  samples: ["{}", "{1,2,3}", "{NULL,1,NULL}", null]
  skip:
    python_asyncpg: ["extended-text", "extended-binary"]

- oid: 1009
